services:
  # Servicio de Base de Datos SQL Server
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver_db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=yourStrong(!)Password123
    ports:
      - "1433:1433" # Mapea el puerto de SQL Server a tu máquina local
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "yourStrong(!)Password123", "-Q", "SELECT 1", "-No"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # Servicio de la Aplicación Web SportReserva
  sportreserva_app:
    container_name: sportreserva_web
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:8080" # Accede a tu app en http://localhost:5000
    environment:
      - ConnectionStrings__conexionSQL=Server=sqlserver;Database=BD_SportReserva;User Id=sa;Password=yourStrong(!)Password123;Trusted_Connection=False;TrustServerCertificate=True;
    depends_on:
      sqlserver:
        condition: service_healthy

volumes:
  sqlserver_data: